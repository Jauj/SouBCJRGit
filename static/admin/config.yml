backend:
  name: github
  repo: Jauj/SouBCJRGit
  branch: main
  base_url: https://api.netlify.com/auth
  auth_endpoint: oauth

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "posts"
    label: "Articles"
    folder: "src/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Catégorie", name: "category", widget: "select", options: ["Analyse", "Thèse", "Contribution", "Compte-rendu"] }
      - { label: "Auteur", name: "author", widget: "string", default: "CJR" }
      - { label: "Corps de l'article", name: "body", widget: "markdown" }